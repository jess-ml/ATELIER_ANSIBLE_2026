---
- name: Atelier Ansible dans GitHub Codespaces - version durcie
  hosts: local
  become: true
  gather_facts: true

  vars:
    page_dest: /var/www/html/index.html

  tasks:
    - name: Afficher le système cible
      debug:
        msg:
          - "Hôte cible : {{ inventory_hostname }}"
          - "OS : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Python : {{ ansible_python.executable | default('inconnu') }}"

    - name: Rechercher des dépôts Yarn dans la configuration APT
      shell: |
        grep -R -n "yarnpkg" /etc/apt/sources.list /etc/apt/sources.list.d/ 2>/dev/null || true
      register: yarn_repo_check
      changed_when: false

    - name: Afficher un avertissement si un dépôt Yarn est détecté
      debug:
        msg:
          - "Attention : un dépôt Yarn a été détecté dans la configuration APT."
          - "Cela peut provoquer un échec de apt update si la clé GPG est absente."
          - "{{ yarn_repo_check.stdout_lines }}"
      when: yarn_repo_check.stdout | length > 0

    - name: Tester la mise à jour du cache APT
      command: apt-get update
      register: apt_update_result
      changed_when: false
      failed_when: false

    - name: Afficher la sortie standard de apt-get update
      debug:
        var: apt_update_result.stdout_lines

    - name: Afficher la sortie d'erreur de apt-get update
      debug:
        var: apt_update_result.stderr_lines
      when: apt_update_result.stderr is defined and apt_update_result.stderr | length > 0

    - name: Arrêter proprement si APT est en erreur
      fail:
        msg: |
          La mise à jour APT a échoué sur la machine cible.

          Code retour : {{ apt_update_result.rc }}

          Cause probable :
          - dépôt externe mal signé
          - clé GPG absente
          - dépôt obsolète ou cassé

          Indices relevés :
          {{ (apt_update_result.stderr | default(''))[:800] }}

          Action conseillée :
          - identifier le dépôt fautif dans /etc/apt/sources.list.d/
          - le désactiver temporairement
          - relancer ensuite le playbook

          Exemple :
          sudo mv /etc/apt/sources.list.d/yarn.list /etc/apt/sources.list.d/yarn.list.disabled
      when: apt_update_result.rc != 0

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Vérifier que le répertoire web existe
      file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Déployer la page HTML personnalisée
      copy:
        src: files/index.html
        dest: "{{ page_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Redémarrer nginx

    - name: Activer nginx au démarrage
      service:
        name: nginx
        enabled: true

    - name: Démarrer nginx
      service:
        name: nginx
        state: started

    - name: Vérifier que le site répond en HTTP
      uri:
        url: http://localhost
        method: GET
        status_code: 200
        return_content: true
      register: test_http
      retries: 5
      delay: 2
      until: test_http.status == 200

    - name: Afficher le code HTTP retourné
      debug:
        msg: "Le serveur répond avec le code HTTP {{ test_http.status }}"

    - name: Afficher un extrait du contenu HTTP
      debug:
        msg: "{{ test_http.content[:200] if test_http.content is defined else 'Aucun contenu retourné' }}"

  handlers:
    - name: Redémarrer nginx
      service:
        name: nginx
        state: restarted
